version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -E "ANTHROPIC_API_KEY|SHORTCUT_API_TOKEN|FIGMA_API_TOKEN|FIGMA_TEAM_ID|FIGMA_PROJECT_ID" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
