<svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#62CCE8"/>
      <stop offset="100%" stop-color="#38CA8C"/>
    </linearGradient>
  </defs>

  <!-- Icon: rounded square -->
  <rect width="56" height="56" rx="13" fill="url(#iconGrad)"/>

  <!-- Outer circle ring -->
  <circle cx="28" cy="28" r="15" stroke="white" stroke-width="2" fill="none"/>

  <!-- 3 nodes at 270° top, 30° bottom-right, 150° bottom-left -->
  <!-- r=15: top=(28,13), br=(28+15*cos30°,28+15*sin30°)=(41,35.5), bl=(15,35.5) -->

  <!-- Hub lines: center(28,28) to each node -->
  <line x1="28" y1="28" x2="28" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="41" y2="35.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="15" y2="35.5" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Center hub dot -->
  <circle cx="28" cy="28" r="2.8" fill="white"/>

  <!-- Node dots -->
  <circle cx="28" cy="13" r="3.2" fill="white"/>
  <circle cx="41" cy="35.5" r="3.2" fill="white"/>
  <circle cx="15" cy="35.5" r="3.2" fill="white"/>

  <!-- Wordmark -->
  <text
    x="70"
    y="40"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="-0.4"
    fill="#171C33"
  >opstream</text>
</svg>
